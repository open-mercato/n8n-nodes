services:
  n8n:
    build: .
    container_name: n8n-openmercato-test
    ports:
      - '5678:5678'
    environment:
      # Custom nodes directory
      - N8N_CUSTOM_EXTENSIONS=/home/node/.n8n/custom

      # Logging
      - N8N_LOG_LEVEL=debug
      - N8N_LOG_OUTPUT=console

      # Basic settings
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http

      # Timezone
      - GENERIC_TIMEZONE=UTC
      - TZ=UTC

      # Allow playwright-core in Code nodes
      - NODE_FUNCTION_ALLOW_EXTERNAL=playwright-core
    volumes:
      # Mount built OpenMercato nodes (read-only)
      - ./dist:/home/node/.n8n/custom/n8n-nodes-open-mercato:ro

      # Persist n8n data (workflows, credentials, etc.)
      - n8n_data:/home/node/.n8n
    depends_on:
      playwright:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:5678/healthz']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Remote Playwright browser server — n8n connects via ws://playwright:3000
  # Version must match playwright-core installed in Dockerfile (currently 1.57.0)
  playwright:
    image: mcr.microsoft.com/playwright:v1.57.0-noble
    container_name: playwright-browser-server
    command: npx -y playwright@1.57.0 run-server --port 3000 --host 0.0.0.0
    shm_size: 1gb
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'bash -c "echo > /dev/tcp/localhost/3000"']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  n8n_data:
    name: n8n_openmercato_data
