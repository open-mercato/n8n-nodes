services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-openmercato-test
    ports:
      - '5678:5678'
    environment:
      # Custom nodes directory
      - N8N_CUSTOM_EXTENSIONS=/home/node/.n8n/custom

      # Logging
      - N8N_LOG_LEVEL=debug
      - N8N_LOG_OUTPUT=console

      # Basic settings
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http

      # Timezone
      - GENERIC_TIMEZONE=UTC
      - TZ=UTC
    volumes:
      # Mount built OpenMercato nodes (read-only)
      - ./dist:/home/node/.n8n/custom/n8n-nodes-open-mercato:ro

      # Persist n8n data (workflows, credentials, etc.)
      - n8n_data:/home/node/.n8n
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:5678/healthz']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  n8n_data:
    name: n8n_openmercato_data
